<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChatRoom</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
      --border: #2a2a35; --accent: #7c5cfc; --accent2: #c084fc;
      --sent: #7c5cfc; --text: #e8e8f0; --muted: #6b6b80;
      --error: #f87171; --success: #4ade80;
    }
    body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
    .app { position: relative; z-index: 1; width: 420px; max-height: 95vh; }
    .auth-screen { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; box-shadow: 0 0 80px rgba(124,92,252,0.08); }
    .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -1px; margin-bottom: 4px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand-sub { font-size: 12px; color: var(--muted); margin-bottom: 36px; letter-spacing: 0.05em; }
    .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 8px; border: none; background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; border-radius: 7px; transition: all 0.2s; }
    .tab.active { background: var(--accent); color: white; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent); }
    .btn { width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 10px; color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.03em; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.1s; }
    .btn:hover { opacity: 0.9; } .btn:active { transform: scale(0.98); } .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .status-msg { margin-top: 14px; font-size: 12px; text-align: center; min-height: 18px; }
    .status-msg.error { color: var(--error); } .status-msg.success { color: var(--success); }
    .chat-screen { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: 0 0 80px rgba(124,92,252,0.08); flex-direction: column; height: 88vh; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); }
    .chat-header-left { display: flex; align-items: center; gap: 10px; }
    .room-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); }
    .room-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
    .room-id-label { font-size: 11px; color: var(--muted); }
    .disconnect-btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 10px; cursor: pointer; transition: all 0.2s; }
    .disconnect-btn:hover { border-color: var(--error); color: var(--error); }
    .room-bar { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
    .room-bar input { flex: 1; padding: 9px 12px; font-size: 12px; }
    .room-bar .join-btn { width: auto; padding: 9px 16px; font-size: 12px; margin-top: 0; border-radius: 8px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .msg { max-width: 72%; padding: 9px 14px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; animation: popIn 0.15s ease; }
    @keyframes popIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .sent { align-self: flex-end; background: var(--sent); color: white; border-bottom-right-radius: 4px; }
    .received { align-self: flex-start; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .system { align-self: center; color: var(--muted); font-size: 11px; font-style: italic; background: none; padding: 2px 0; }
    .input-bar { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--surface2); }
    .input-bar input { flex: 1; padding: 11px 14px; border-radius: 10px; font-size: 13px; }
    .send-btn { width: auto; padding: 11px 18px; margin-top: 0; border-radius: 10px; font-size: 13px; }
  </style>
</head>
<body>
<div class="app">
  <!-- AUTH SCREEN -->
  <div class="auth-screen" id="authScreen">
    <div class="brand">ChatRoom</div>
    <div class="brand-sub"> real-time encrypted rooms</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <!-- Login -->
    <div id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') handleLogin()" /></div>
      <button class="btn" onclick="handleLogin()" id="loginBtn">Login</button>
    </div>
    <!-- Signup -->
    <div id="signupForm" style="display:none">
      <div class="form-group"><label>Name</label><input type="text" id="signupName" placeholder="Your name" /></div>
      <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com" /></div>
      <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') handleSignup()" /></div>
      <button class="btn" onclick="handleSignup()" id="signupBtn">Create Account</button>
    </div>
    <div class="status-msg" id="authStatus"></div>
  </div>

  <!-- CHAT SCREEN -->
  <div class="chat-screen" id="chatScreen">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="room-dot"></div>
        <div>
          <div class="room-name">ChatRoom</div>
          <div class="room-id-label" id="roomLabel">not in a room</div>
        </div>
      </div>
      <button class="disconnect-btn" onclick="disconnect()">Disconnect</button>
    </div>
    <div class="room-bar">
      <input id="roomInput" placeholder="Enter room ID..." value="room-1" />
      <button class="btn join-btn" onclick="joinRoom()" id="joinBtn">Join</button>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
      <input id="msgInput" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter') sendMsg()" />
      <button class="btn send-btn" onclick="sendMsg()" id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
  let ws = null, token = null, inRoom = false

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')))
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none'
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none'
    setStatus('', '')
  }

  function setStatus(msg, type) {
    const el = document.getElementById('authStatus')
    el.textContent = msg
    el.className = 'status-msg ' + type
  }

  async function handleSignup() {
    const name = document.getElementById('signupName').value.trim()
    const email = document.getElementById('signupEmail').value.trim()
    const password = document.getElementById('signupPassword').value
    if (!name || !email || !password) return setStatus('Fill in all fields', 'error')
    const btn = document.getElementById('signupBtn')
    btn.disabled = true; btn.textContent = 'Creating...'
    try {
      await fetch('http://localhost:9000/signup', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password }) })
      setStatus('Account created! Please login.', 'success')
      switchTab('login')
    } catch { setStatus('Server error. Try again.', 'error') }
    finally { btn.disabled = false; btn.textContent = 'Create Account' }
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim()
    const password = document.getElementById('loginPassword').value
    if (!email || !password) return setStatus('Fill in all fields', 'error')
    const btn = document.getElementById('loginBtn')
    btn.disabled = true; btn.textContent = 'Logging in...'
    try {
      const res = await fetch('http://localhost:9000/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) })
      const data = await res.json()
      if (!data.token) { setStatus(data.message || 'Login failed', 'error'); return }
      token = data.token   // ✅ save token
      connectWebSocket()   // ✅ now connect WS
    } catch { setStatus('Server error. Try again.', 'error') }
    finally { btn.disabled = false; btn.textContent = 'Login' }
  }

  function connectWebSocket() {
    ws = new WebSocket(`ws://localhost:9000?token=${token}`)  // ✅ token in URL
    ws.onopen = () => {
      document.getElementById('authScreen').style.display = 'none'
      document.getElementById('chatScreen').style.display = 'flex'
    }
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data)
        if (data.message) {
          addMsg(`${data.sender}: ${data.message}`, 'received')
        }
        else if (data.error) addMsg('⚠ ' + data.error, 'system')
      } catch { addMsg(e.data, 'system') }
    }
    ws.onclose = () => {
      ws = null; token = null; inRoom = false
      document.getElementById('chatScreen').style.display = 'none'
      document.getElementById('authScreen').style.display = 'block'
      document.getElementById('roomLabel').textContent = 'not in a room'
      document.getElementById('msgInput').disabled = true
      document.getElementById('sendBtn').disabled = true
      document.getElementById('joinBtn').disabled = false
      document.getElementById('joinBtn').textContent = 'Join'
      document.getElementById('messages').innerHTML = ''
      setStatus('Session ended. Please login again.', 'error')
    }
  }

  function joinRoom() {
    const roomId = document.getElementById('roomInput').value.trim()
    if (!roomId || !ws) return
    ws.send(JSON.stringify({ type: 'join', roomId }))
    inRoom = true
    document.getElementById('roomLabel').textContent = '# ' + roomId
    document.getElementById('msgInput').disabled = false
    document.getElementById('sendBtn').disabled = false
    document.getElementById('joinBtn').textContent = 'Joined ✓'
    document.getElementById('joinBtn').disabled = true
    addMsg('Joined room ' + roomId, 'system')
    document.getElementById('msgInput').focus()
  }

  function sendMsg() {
    const input = document.getElementById('msgInput')
    const roomId = document.getElementById('roomInput').value.trim()
    const msg = input.value.trim()
    if (!msg || !ws || !inRoom) return
    ws.send(JSON.stringify({ type: 'message', roomId, message: msg }))
    addMsg(msg, 'sent')
    input.value = ''
  }

  function disconnect() { if (ws) ws.close() }

  function addMsg(text, type) {
    const el = document.getElementById('messages')
    const div = document.createElement('div')
    div.classList.add('msg', type)
    div.textContent = text
    el.appendChild(div)
    el.scrollTop = el.scrollHeight
  }
</script>
</body>
</html>
